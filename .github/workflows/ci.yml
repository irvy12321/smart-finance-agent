name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Frontend Jobs
  # ============================================================
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ============================================================
  # Backend Jobs
  # ============================================================
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r requirements.txt

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Run Ruff formatter check
        run: ruff format --check .

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            -v \
            --cov=app \
            --cov-report=html:coverage/html \
            --cov-report=json:coverage/coverage.json \
            --cov-report=xml:coverage/coverage.xml \
            --cov-report=term-missing \
            --junitxml=coverage/junit.xml
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          JWT_SECRET_KEY: test-jwt-secret-key-at-least-32-chars-long-aaaa
          DEFAULT_ADMIN_PASSWORD: test-admin-password-123
          ALLOW_MOCK_DATA: "false"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-test-results
          path: backend/coverage/junit.xml
          retention-days: 7

  # ============================================================
  # Agent Evaluation (golden set regression gate)
  # The dry-run step always validates that the golden dataset parses
  # and the evaluation harness imports. The full end-to-end eval calls
  # real LLMs, so it only runs when the repo variable
  # AGENT_EVAL_ENABLED == 'true' and the LLM secrets are configured
  # (same dormant-by-default pattern as the deploy job).
  # ============================================================
  agent-eval:
    name: Agent Eval
    runs-on: ubuntu-latest
    needs: [backend-lint]
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate golden set (dry run)
        run: python -m app.core.evaluation --dry-run
        env:
          PYTHONPATH: ${{ github.workspace }}/backend

      - name: Run golden set eval with thresholds
        if: vars.AGENT_EVAL_ENABLED == 'true'
        run: |
          python -m app.core.evaluation \
            --json-out eval_results.json \
            --min-task-success 0.8 \
            --min-tool-accuracy 0.6 \
            --min-retrieval-recall 0.8 \
            --min-groundedness 0.6
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          JWT_SECRET_KEY: test-jwt-secret-key-at-least-32-chars-long-aaaa
          ALLOW_MOCK_DATA: "true"
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'mimo' }}
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}

      - name: Upload eval results
        if: vars.AGENT_EVAL_ENABLED == 'true' && always()
        uses: actions/upload-artifact@v7
        with:
          name: agent-eval-results
          path: backend/eval_results.json
          retention-days: 14

  # ============================================================
  # Coverage Report Job
  # ============================================================
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test]
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download frontend coverage
        uses: actions/download-artifact@v8
        with:
          name: frontend-coverage
          path: coverage/frontend/

      - name: Download backend coverage
        uses: actions/download-artifact@v8
        with:
          name: backend-coverage
          path: coverage/backend/

      - name: Generate coverage summary
        run: |
          echo "## 📊 Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Backend coverage
          if [ -f coverage/backend/coverage.json ]; then
            BACKEND_COV=$(python3 -c "
          import json
          with open('coverage/backend/coverage.json') as f:
              data = json.load(f)
              total = data['totals']['percent_covered']
              print(f'{total:.1f}')
          " 2>/dev/null || echo "N/A")
            echo "### Backend (Python)" >> $GITHUB_STEP_SUMMARY
            echo "- Coverage: **${BACKEND_COV}%**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Frontend coverage
          if [ -f coverage/frontend/coverage-summary.json ]; then
            FRONTEND_COV=$(python3 -c "
          import json
          with open('coverage/frontend/coverage-summary.json') as f:
              data = json.load(f)
              total = data['total']['lines']['pct']
              print(f'{total:.1f}')
          " 2>/dev/null || echo "N/A")
            echo "### Frontend (TypeScript)" >> $GITHUB_STEP_SUMMARY
            echo "- Coverage: **${FRONTEND_COV}%**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: coverage-report
          message: |
            ## 📊 Test Coverage Report

            | Component | Coverage |
            |-----------|----------|
            | Backend (Python) | See [workflow artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
            | Frontend (TypeScript) | See [workflow artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            > Coverage reports are available as workflow artifacts.

  # ============================================================
  # Docker Build (validate backend & frontend images build)
  # ============================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-lint]
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')) || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: false
          tags: sfa-backend:latest
          outputs: type=docker,dest=/tmp/sfa-backend.tar
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Package backend image for ECS
        run: gzip -1 /tmp/sfa-backend.tar

      - name: Upload backend image for deploy
        uses: actions/upload-artifact@v7
        with:
          name: sfa-backend-image
          path: /tmp/sfa-backend.tar.gz
          compression-level: 0
          retention-days: 1

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: false
          tags: sfa-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ============================================================
  # Auto-deploy to ECS
  # The ECS host cannot reliably reach GitHub, Hugging Face, or the PyTorch
  # package index. The runner therefore ships the source plus the already
  # validated backend image; ECS only loads it, builds the frontend, and restarts.
  # The build runs detached (nohup) and a polling step waits for it,
  # which is resilient to the host's sshd briefly stalling under load.
  #
  # Dormant by default: only runs on push to master AND when the repo
  # variable DEPLOY_ENABLED == 'true'. This keeps CI green until all
  # required secrets/variables are configured. Required secrets:
  #   ECS_HOST, ECS_SSH_USER, ECS_SSH_PASSWORD, ECS_PROJECT_DIR
  #   (optional) ECS_SSH_PORT
  #   (optional) SFA_DEFAULT_ADMIN_PASSWORD for production bootstrap
  # Optional variables:
  #   RESET_ADMIN_PASSWORD_ON_DEPLOY=true to rotate/reset admin during deploy
  # ============================================================
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test, frontend-build, backend-lint, backend-test, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && vars.DEPLOY_ENABLED == 'true'
    env:
      ECS_HOST: ${{ secrets.ECS_HOST }}
      ECS_SSH_USER: ${{ secrets.ECS_SSH_USER }}
      ECS_SSH_PASSWORD: ${{ secrets.ECS_SSH_PASSWORD }}
      ECS_SSH_PORT: ${{ secrets.ECS_SSH_PORT }}
      ECS_PROJECT_DIR: ${{ secrets.ECS_PROJECT_DIR }}
      SFA_DEFAULT_ADMIN_PASSWORD: ${{ secrets.SFA_DEFAULT_ADMIN_PASSWORD }}
      RESET_ADMIN_PASSWORD_ON_DEPLOY: ${{ vars.RESET_ADMIN_PASSWORD_ON_DEPLOY || 'false' }}
      SSH_OPTS: "-o StrictHostKeyChecking=no -o PreferredAuthentications=password -o PubkeyAuthentication=no -o ConnectTimeout=60 -o ServerAliveInterval=15"
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download validated backend image
        uses: actions/download-artifact@v8
        with:
          name: sfa-backend-image
          path: /tmp

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Ship source to ECS and start build
        run: |
          set -euo pipefail
          PORT="${ECS_SSH_PORT:-22}"
          RUN_SUFFIX="${GITHUB_RUN_ID:-manual}_${GITHUB_RUN_ATTEMPT:-0}"
          OK_FILE="/tmp/sfa_deploy_${RUN_SUFFIX}.ok"
          FAIL_FILE="/tmp/sfa_deploy_${RUN_SUFFIX}.fail"
          LOG_FILE="/tmp/sfa_deploy_${RUN_SUFFIX}.log"
          APP_ENV_FILE="/tmp/sfa_app_env_${RUN_SUFFIX}"
          git archive --format=tar.gz -o /tmp/src.tar.gz HEAD
          umask 077
          {
            printf 'SFA_DEFAULT_ADMIN_PASSWORD=%q\n' "$SFA_DEFAULT_ADMIN_PASSWORD"
            printf 'RESET_ADMIN_PASSWORD_ON_DEPLOY=%q\n' "$RESET_ADMIN_PASSWORD_ON_DEPLOY"
          } > "$APP_ENV_FILE"
          export SSHPASS="$ECS_SSH_PASSWORD"
          sshpass -e scp $SSH_OPTS -P "$PORT" /tmp/src.tar.gz "$ECS_SSH_USER@$ECS_HOST:/tmp/src.tar.gz"
          sshpass -e scp $SSH_OPTS -P "$PORT" /tmp/sfa-backend.tar.gz "$ECS_SSH_USER@$ECS_HOST:/tmp/sfa-backend.tar.gz"
          sshpass -e scp $SSH_OPTS -P "$PORT" "$APP_ENV_FILE" "$ECS_SSH_USER@$ECS_HOST:$APP_ENV_FILE"
          rm -f "$APP_ENV_FILE"
          REMOTE_ENV=$(printf "PROJECT_DIR=%q OK_FILE=%q FAIL_FILE=%q LOG_FILE=%q APP_ENV_FILE=%q" "$ECS_PROJECT_DIR" "$OK_FILE" "$FAIL_FILE" "$LOG_FILE" "$APP_ENV_FILE")
          sshpass -e ssh $SSH_OPTS -p "$PORT" "$ECS_SSH_USER@$ECS_HOST" "$REMOTE_ENV bash -s" <<'REMOTE_SCRIPT'
            set -e
            cd "$PROJECT_DIR"
            if [ -f "$APP_ENV_FILE" ]; then
              set -a
              . "$APP_ENV_FILE"
              set +a
              rm -f "$APP_ENV_FILE"
            fi
            tar xzf /tmp/src.tar.gz
            upsert_env_var() {
              key="$1"
              value="$2"
              file="$3"
              [ -n "$value" ] || return 0
              [ -f "$file" ] || touch "$file"
              if grep -q "^${key}=" "$file"; then
                tmp="${file}.tmp.$$"
                awk -v key="$key" -v value="$value" '
                  BEGIN { prefix = key "=" }
                  $0 ~ "^" key "=" { $0 = prefix value }
                  { print }
                ' "$file" > "$tmp"
                mv "$tmp" "$file"
              else
                printf '\n%s=%s\n' "$key" "$value" >> "$file"
              fi
            }
            upsert_env_var "DEFAULT_ADMIN_PASSWORD" "${SFA_DEFAULT_ADMIN_PASSWORD:-}" "backend/.env"
            if ! grep -Eq '^DEFAULT_ADMIN_PASSWORD=.{12,}' backend/.env 2>/dev/null; then
              echo 'DEFAULT_ADMIN_PASSWORD is missing or too short in backend/.env. Set repository secret SFA_DEFAULT_ADMIN_PASSWORD.'
              exit 1
            fi
            nohup sh -c '
              gzip -dc /tmp/sfa-backend.tar.gz | docker load &&
              rm -f /tmp/sfa-backend.tar.gz &&
              if [ "${RESET_ADMIN_PASSWORD_ON_DEPLOY:-false}" = "true" ]; then
                docker compose -f docker-compose.prod.yml run --rm --no-deps backend python -m app.ops.reset_admin_password;
              fi &&
              ( docker compose -f docker-compose.prod.yml build frontend || { sleep 10; docker compose -f docker-compose.prod.yml build frontend; } || { sleep 15; docker compose -f docker-compose.prod.yml build frontend; } ) &&
              docker compose -f docker-compose.prod.yml up -d --no-build &&
              touch "$OK_FILE" || touch "$FAIL_FILE"
            ' > "$LOG_FILE" 2>&1 &
            echo 'Build started on ECS'
          REMOTE_SCRIPT

      - name: Wait for ECS build + restart
        run: |
          set -uo pipefail
          PORT="${ECS_SSH_PORT:-22}"
          RUN_SUFFIX="${GITHUB_RUN_ID:-manual}_${GITHUB_RUN_ATTEMPT:-0}"
          OK_FILE="/tmp/sfa_deploy_${RUN_SUFFIX}.ok"
          FAIL_FILE="/tmp/sfa_deploy_${RUN_SUFFIX}.fail"
          LOG_FILE="/tmp/sfa_deploy_${RUN_SUFFIX}.log"
          export SSHPASS="$ECS_SSH_PASSWORD"
          for i in $(seq 1 90); do
            sleep 20
            OUT=$(sshpass -e ssh $SSH_OPTS -p "$PORT" "$ECS_SSH_USER@$ECS_HOST" \
              "if [ -f '$OK_FILE' ]; then echo OK; elif [ -f '$FAIL_FILE' ]; then echo FAIL; else echo RUNNING; fi; tail -n 1 '$LOG_FILE' 2>/dev/null" 2>/dev/null) || OUT="RUNNING (ssh retry)"
            STATE=$(printf '%s\n' "$OUT" | head -n 1)
            echo "[$i] $OUT"
            if [ "$STATE" = "OK" ]; then
              echo "Deploy succeeded."
              sshpass -e ssh $SSH_OPTS -p "$PORT" "$ECS_SSH_USER@$ECS_HOST" 'docker ps --format "{{.Names}} {{.Status}}" | grep sfa' 2>/dev/null || true
              exit 0
            fi
            if [ "$STATE" = "FAIL" ]; then
              echo "::error::ECS deploy failed. Last 40 deploy log lines:"
              sshpass -e ssh $SSH_OPTS -p "$PORT" "$ECS_SSH_USER@$ECS_HOST" "tail -n 40 '$LOG_FILE'" 2>/dev/null || true
              echo "::group::ECS container status"
              sshpass -e ssh $SSH_OPTS -p "$PORT" "$ECS_SSH_USER@$ECS_HOST" 'docker ps -a --filter "name=sfa" --format "{{.Names}} {{.Status}}"' 2>/dev/null || true
              echo "::endgroup::"
              echo "::group::Backend health"
              sshpass -e ssh $SSH_OPTS -p "$PORT" "$ECS_SSH_USER@$ECS_HOST" 'docker inspect --format "{{json .State.Health}}" sfa-backend-prod 2>/dev/null || true' 2>/dev/null || true
              echo "::endgroup::"
              echo "::group::Backend logs"
              sshpass -e ssh $SSH_OPTS -p "$PORT" "$ECS_SSH_USER@$ECS_HOST" 'docker logs --tail 120 sfa-backend-prod 2>&1 || true' 2>/dev/null || true
              echo "::endgroup::"
              exit 1
            fi
          done
          echo "::error::Timed out waiting for ECS deploy."
          exit 1
