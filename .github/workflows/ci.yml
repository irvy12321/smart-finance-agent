name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Frontend Jobs
  # ============================================================
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ============================================================
  # Backend Jobs
  # ============================================================
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r requirements.txt

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Run Ruff formatter check
        run: ruff format --check .

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            -v \
            --cov=app \
            --cov-report=html:coverage/html \
            --cov-report=json:coverage/coverage.json \
            --cov-report=xml:coverage/coverage.xml \
            --cov-report=term-missing \
            --junitxml=coverage/junit.xml
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          JWT_SECRET_KEY: test-jwt-secret-key-at-least-32-chars-long-aaaa
          DEFAULT_ADMIN_PASSWORD: test-admin-password-123
          ALLOW_MOCK_DATA: "false"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-test-results
          path: backend/coverage/junit.xml
          retention-days: 7

  # ============================================================
  # Coverage Report Job
  # ============================================================
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test]
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download frontend coverage
        uses: actions/download-artifact@v8
        with:
          name: frontend-coverage
          path: coverage/frontend/

      - name: Download backend coverage
        uses: actions/download-artifact@v8
        with:
          name: backend-coverage
          path: coverage/backend/

      - name: Generate coverage summary
        run: |
          echo "## 📊 Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Backend coverage
          if [ -f coverage/backend/coverage.json ]; then
            BACKEND_COV=$(python3 -c "
          import json
          with open('coverage/backend/coverage.json') as f:
              data = json.load(f)
              total = data['totals']['percent_covered']
              print(f'{total:.1f}')
          " 2>/dev/null || echo "N/A")
            echo "### Backend (Python)" >> $GITHUB_STEP_SUMMARY
            echo "- Coverage: **${BACKEND_COV}%**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Frontend coverage
          if [ -f coverage/frontend/coverage-summary.json ]; then
            FRONTEND_COV=$(python3 -c "
          import json
          with open('coverage/frontend/coverage-summary.json') as f:
              data = json.load(f)
              total = data['total']['lines']['pct']
              print(f'{total:.1f}')
          " 2>/dev/null || echo "N/A")
            echo "### Frontend (TypeScript)" >> $GITHUB_STEP_SUMMARY
            echo "- Coverage: **${FRONTEND_COV}%**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: coverage-report
          message: |
            ## 📊 Test Coverage Report

            | Component | Coverage |
            |-----------|----------|
            | Backend (Python) | See [workflow artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
            | Frontend (TypeScript) | See [workflow artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            > Coverage reports are available as workflow artifacts.

  # ============================================================
  # Docker Build (validate backend & frontend images build)
  # ============================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-lint]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: false
          tags: sfa-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: false
          tags: sfa-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ============================================================
  # Auto-deploy to ECS
  # The ECS host cannot reach github.com (common in mainland-China
  # Aliyun networks), so instead of pulling on the host we SHIP the
  # source from the runner over SSH, then build + restart on the host.
  # The build runs detached (nohup) and a polling step waits for it,
  # which is resilient to the host's sshd briefly stalling under load.
  #
  # Dormant by default: only runs on push to master AND when the repo
  # variable DEPLOY_ENABLED == 'true'. This keeps CI green until all
  # required secrets/variables are configured. Required secrets:
  #   ECS_HOST, ECS_SSH_USER, ECS_SSH_PASSWORD, ECS_PROJECT_DIR
  #   (optional) ECS_SSH_PORT
  # ============================================================
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test, frontend-build, backend-lint, backend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && vars.DEPLOY_ENABLED == 'true'
    env:
      ECS_HOST: ${{ secrets.ECS_HOST }}
      ECS_SSH_USER: ${{ secrets.ECS_SSH_USER }}
      ECS_SSH_PASSWORD: ${{ secrets.ECS_SSH_PASSWORD }}
      ECS_SSH_PORT: ${{ secrets.ECS_SSH_PORT }}
      ECS_PROJECT_DIR: ${{ secrets.ECS_PROJECT_DIR }}
      SSH_OPTS: "-o StrictHostKeyChecking=no -o PreferredAuthentications=password -o PubkeyAuthentication=no -o ConnectTimeout=60 -o ServerAliveInterval=15"
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Ship source to ECS and start build
        run: |
          set -euo pipefail
          PORT="${ECS_SSH_PORT:-22}"
          git archive --format=tar.gz -o /tmp/src.tar.gz HEAD
          export SSHPASS="$ECS_SSH_PASSWORD"
          sshpass -e scp $SSH_OPTS -P "$PORT" /tmp/src.tar.gz "$ECS_SSH_USER@$ECS_HOST:/tmp/src.tar.gz"
          sshpass -e ssh $SSH_OPTS -p "$PORT" "$ECS_SSH_USER@$ECS_HOST" "
            set -e
            cd '$ECS_PROJECT_DIR'
            tar xzf /tmp/src.tar.gz
            rm -f /tmp/sfa_deploy.ok /tmp/sfa_deploy.fail /tmp/sfa_deploy.log
            # Each image build is retried up to 3x: the ECS host's Docker registry
            # mirror occasionally fails DNS resolution (transient), which used to
            # fail the whole deploy and require a manual re-run.
            nohup sh -c '( docker compose -f docker-compose.prod.yml build backend || { sleep 10; docker compose -f docker-compose.prod.yml build backend; } || { sleep 15; docker compose -f docker-compose.prod.yml build backend; } ) \
              && ( docker compose -f docker-compose.prod.yml build frontend || { sleep 10; docker compose -f docker-compose.prod.yml build frontend; } || { sleep 15; docker compose -f docker-compose.prod.yml build frontend; } ) \
              && docker compose -f docker-compose.prod.yml up -d --remove-orphans \
              && docker image prune -f \
              && touch /tmp/sfa_deploy.ok || touch /tmp/sfa_deploy.fail' \
              > /tmp/sfa_deploy.log 2>&1 &
            echo 'Build started on ECS'
          "

      - name: Wait for ECS build + restart
        run: |
          set -uo pipefail
          PORT="${ECS_SSH_PORT:-22}"
          export SSHPASS="$ECS_SSH_PASSWORD"
          for i in $(seq 1 90); do
            sleep 20
            OUT=$(sshpass -e ssh $SSH_OPTS -p "$PORT" "$ECS_SSH_USER@$ECS_HOST" \
              'if [ -f /tmp/sfa_deploy.ok ]; then echo OK; elif [ -f /tmp/sfa_deploy.fail ]; then echo FAIL; else echo RUNNING; fi; tail -n 1 /tmp/sfa_deploy.log 2>/dev/null' 2>/dev/null) || OUT="RUNNING (ssh retry)"
            STATE=$(printf '%s\n' "$OUT" | head -n 1)
            echo "[$i] $OUT"
            if [ "$STATE" = "OK" ]; then
              echo "Deploy succeeded."
              sshpass -e ssh $SSH_OPTS -p "$PORT" "$ECS_SSH_USER@$ECS_HOST" 'docker ps --format "{{.Names}} {{.Status}}" | grep sfa' 2>/dev/null || true
              exit 0
            fi
            if [ "$STATE" = "FAIL" ]; then
              echo "::error::ECS build failed. Last 40 log lines:"
              sshpass -e ssh $SSH_OPTS -p "$PORT" "$ECS_SSH_USER@$ECS_HOST" 'tail -n 40 /tmp/sfa_deploy.log' 2>/dev/null || true
              exit 1
            fi
          done
          echo "::error::Timed out waiting for ECS deploy."
          exit 1
