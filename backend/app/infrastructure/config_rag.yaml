# RAG 基础配置
chunk_size: 500
chunk_overlap: 50
embedding_dim: 384
top_k: 5

# Embedding 配置
# mode: "dev"      = HashEmbedder (MD5 哈希伪向量, 快速, 无语义)
#       "prod"     = BM25Embedder (BM25/TF-IDF 词法检索, 非神经语义嵌入)
#       "semantic" = SemanticEmbedder (真实语义向量, sentence-transformers / 免-torch model2vec, 可选依赖)
# dev/prod 为词法模式(token 重叠)，semantic 才是语义匹配; 三种模式的 Recall@k/MRR 对比见 README「RAG 检索质量评测」。
# model_name 在 BM25 模式下未被使用; dim 必须与实现一致 (BM25Embedder 固定输出 384 维)。
embedding:
  mode: "prod"
  model_name: "bm25-lexical"
  dim: 384
  batch_size: 32
  device: "cpu"
