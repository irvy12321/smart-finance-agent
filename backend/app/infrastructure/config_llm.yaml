# LLM配置
# 注意: 模型、api_key、api_base 现在由 .env 中的 LLM_PROVIDER 自动决定
# 以下配置仅覆盖默认值

temperature: 0.3
max_tokens: 4096
timeout: 120
max_retries: 3

# 多Agent模型分配
# 温度策略: 低温=确定性(Plan/Exec) 中温=创造性(Reason/Report)
agent_models:
  planner_temperature: 0.1
  executor_temperature: 0.1
  reasoner_temperature: 0.3
  report_temperature: 0.4
  chart_temperature: 0.3

# Token 预算限制
token_budgets:
  planner: 4000
  executor: 4000
  reasoner: 4000
  report: 4000
  chart: 3000
  synthesizer: 4000

# 智能路由配置
smart_router:
  complexity_thresholds:
    high: 0.7
    medium: 0.3
  tool_reliability:
    news_search: 0.9
    rag_retrieve: 0.85
    crawler: 0.7
    llm_synthesize: 0.95
  reliability_alpha: 0.3
