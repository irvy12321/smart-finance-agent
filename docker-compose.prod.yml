version: "3.8"

services:
  # ============================================
  # Backend Service (FastAPI) - Production
  # ============================================
  backend:
    image: sfa-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: sfa-backend-prod
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=production
      - PYTHONUNBUFFERED=1
      - ALLOW_MOCK_DATA=${ALLOW_MOCK_DATA:-false}
      - LITELLM_LOCAL_MODEL_COST_MAP=${LITELLM_LOCAL_MODEL_COST_MAP:-true}
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - RAG_EMBEDDING_MODE=semantic
      - RAG_EMBEDDING_BACKEND=sentence_transformers
      - RAG_EMBEDDING_LOCAL_FILES_ONLY=true
      - RAG_SEMANTIC_FAILURE_POLICY=error
      - RAG_EMBEDDING_MODEL=BAAI/bge-small-zh-v1.5
      - RAG_EMBEDDING_REVISION=7999e1d3359715c523056ef9478215996d62a620
      - RAG_EMBEDDING_DEVICE=cpu
    expose:
      - "8000"
    volumes:
      - backend_data:/app/data
      - backend_output:/app/output
      - backend_logs:/app/logs
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - sfa-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G

  # ============================================
  # Frontend Service (React + Nginx) - Production
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        - VITE_API_URL=/api
        - VITE_SENTRY_DSN=${SENTRY_DSN:-}
    container_name: sfa-frontend-prod
    ports:
      - "80:8080"
      # Enable after copying nginx/conf.d/default.conf.example to default.conf
      # and mounting valid certificates under nginx/ssl.
      # - "443:8443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sfa-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M

# ============================================
# Volumes
# ============================================
volumes:
  backend_data:
    driver: local
  backend_output:
    driver: local
  backend_logs:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  sfa-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
