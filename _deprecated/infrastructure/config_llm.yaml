# 小米MiMo官方API配置
model: "openai/mimo-v2.5-pro"
temperature: 0.3
max_tokens: 4096
timeout: 120
max_retries: 3
api_base: "https://api.xiaomimimo.com/v1"

# 多Agent模型分配
# 温度策略: 低温=确定性(Plan/Exec) 中温=创造性(Reason/Report)
agent_models:
  planner_model: "openai/mimo-v2.5-pro"
  planner_temperature: 0.1
  executor_model: "openai/mimo-v2.5-pro"
  executor_temperature: 0.1
  reasoner_model: "openai/mimo-v2.5-pro"
  reasoner_temperature: 0.3
  report_model: "openai/mimo-v2.5-pro"
  report_temperature: 0.4
  chart_model: "openai/mimo-v2.5-pro"
  chart_temperature: 0.3

# Token 预算限制
token_budgets:
  planner: 1800
  executor: 2000
  reasoner: 3500
  report: 2500
  chart: 2000
  synthesizer: 3000

# 智能路由配置
smart_router:
  complexity_thresholds:
    high: 0.7
    medium: 0.3
  lightweight_model: "openai/mimo-v2.5-pro"
  standard_model: "openai/mimo-v2.5-pro"
  high_quality_model: "openai/mimo-v2.5-pro"
  fallback_models:
    - "openai/mimo-v2.5-pro"
  tool_reliability:
    news_search: 0.9
    rag_retrieve: 0.85
    crawler: 0.7
    llm_synthesize: 0.95
  reliability_alpha: 0.3
