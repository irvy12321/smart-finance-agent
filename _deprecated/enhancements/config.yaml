# Smart Finance Agent 增强系统配置
# 所有功能默认关闭，需要显式启用

# 功能开关系统
feature_toggle:
  enabled: true
  config_path: "enhancements/feature_toggle/config.yaml"
  env_prefix: "SFA_"
  log_changes: true

# 可观测性模块
observability:
  enabled: false
  structured_logging:
    enabled: false
    format: "json"
    include_trace_id: true
    include_span_id: true
    output_path: "output/logs/structured.json"
  metrics_aggregation:
    enabled: false
    export_interval_seconds: 60
    export_format: "json"
    export_path: "output/metrics/metrics.json"
  performance_profiling:
    enabled: false
    memory_profiling: true
    snapshot_interval_seconds: 30

# 回放系统
replay:
  enabled: false
  recording:
    enabled: false
    storage_path: "output/replay_recordings"
    max_file_size_mb: 100
    compression: true
  playback:
    enabled: false
    deterministic_mode: false
    speed_factor: 1.0

# 性能分析模块
performance:
  enabled: false
  cpu_profiling:
    enabled: false
    sampling_rate_hz: 100
    output_format: "snakeviz"
    output_path: "output/cpu_profiles"
  network_profiling:
    enabled: false
    track_requests: true
    track_dns: false
  llm_profiling:
    enabled: false
    track_token_usage: true
    track_latency: true
    track_costs: true
    pricing:
      "openai/mimo-v2.5-pro":
        input: 0.002
        output: 0.006

# 测试增强模块
testing:
  enabled: false
  fixtures:
    enabled: false
    auto_load: true
    fixtures_path: "tests/fixtures"
  mocks:
    enabled: false
    auto_mock_external: true
    mock_llm_responses: false
  data_management:
    enabled: false
    test_data_path: "tests/data"
    cleanup_after_test: true

# 集成配置
integration:
  auto_load_on_startup: true
  load_order:
    - feature_toggle
    - observability
    - performance
    - replay
    - testing
  inter_module_communication: true