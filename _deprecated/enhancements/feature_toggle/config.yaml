# 功能开关配置文件
# 所有功能默认关闭，需要显式启用

# 功能开关系统配置
feature_toggle:
  enabled: true  # 功能开关系统本身是否启用
  config_path: "enhancements/feature_toggle/config.yaml"  # 配置文件路径
  env_prefix: "SFA_"  # 环境变量前缀
  log_changes: true  # 是否记录开关状态变更

# 可观测性模块
observability:
  enabled: false
  structured_logging:
    enabled: false
    format: "json"  # json 或 text
    include_trace_id: true
    include_span_id: true
  metrics_aggregation:
    enabled: false
    export_interval_seconds: 60
    export_format: "prometheus"  # prometheus, json, csv
  performance_profiling:
    enabled: false
    cpu_profiling: false
    memory_profiling: false
    network_profiling: false

# 回放系统
replay:
  enabled: false
  recording:
    enabled: false
    storage_path: "output/replay_recordings"
    max_file_size_mb: 100
    compression: true
  playback:
    enabled: false
    deterministic_mode: false
    speed_factor: 1.0  # 1.0 为实时速度

# 性能分析模块
performance:
  enabled: false
  cpu_profiling:
    enabled: false
    sampling_rate_hz: 100
    output_format: "snakeviz"  # snakeviz, json, text
  memory_profiling:
    enabled: false
    track_allocations: false
    snapshot_interval_seconds: 30
  network_profiling:
    enabled: false
    track_requests: true
    track_dns: false
  llm_profiling:
    enabled: false
    track_token_usage: true
    track_latency: true
    track_costs: true

# 测试增强模块
testing:
  enabled: false
  fixtures:
    enabled: false
    auto_load: true
    fixtures_path: "tests/fixtures"
  mocks:
    enabled: false
    auto_mock_external: true
    mock_llm_responses: false
  data_management:
    enabled: false
    test_data_path: "tests/data"
    cleanup_after_test: true

# 集成配置
integration:
  # 是否在启动时自动加载所有启用的模块
  auto_load_on_startup: true
  # 模块加载顺序（依赖关系）
  load_order:
    - feature_toggle
    - observability
    - performance
    - replay
    - testing
  # 是否允许模块间通信
  inter_module_communication: true