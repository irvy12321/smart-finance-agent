version: "3.8"

services:
  # ============================================
  # Backend Service (FastAPI)
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - ENVIRONMENT=production
    container_name: sfa-backend
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=production
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
      - backend_output:/app/output
      - backend_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - sfa-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ============================================
  # Frontend Service (React + Nginx)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
        - VITE_SENTRY_DSN=${SENTRY_DSN:-}
    container_name: sfa-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - sfa-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 64M

# ============================================
# Volumes
# ============================================
volumes:
  backend_data:
    driver: local
  backend_output:
    driver: local
  backend_logs:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  sfa-network:
    driver: bridge
